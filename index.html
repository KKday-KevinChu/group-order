  // ── UTILS ────────────────────────────────────────────────
  function genToken(len=12) {
    return Array.from(crypto.getRandomValues(new Uint8Array(len)))
      .map(b => b.toString(36)).join('').slice(0,len)
  }

  function getUrlToken() {
    return new URLSearchParams(window.location.search).get('t')
  }

  function getMyPersonToken() {
    let t = localStorage.getItem('teaman-person-token')
    if (!t) { t = genToken(16); localStorage.setItem('teaman-person-token', t) }
    return t
  }

  // ── MAIN APP ─────────────────────────────────────────────
  function OrderApp({ sessionToken }) {
    const [session, setSession]     = React.useState(null)
    const [orders, setOrders]       = React.useState([])
    const [activeCat, setActiveCat] = React.useState(0)
    const [modal, setModal]         = React.useState(null)
    const [editingOrder, setEditingOrder] = React.useState(null)
    const [form, setForm]           = React.useState({})
    const [showSummary, setShowSummary] = React.useState(false)
    const [showAdmin, setShowAdmin] = React.useState(false)
    const [toast, setToast]         = React.useState('')
    const [copied, setCopied]       = React.useState(false)
    const [deadlineInput, setDeadlineInput] = React.useState('')
    const toastRef = React.useRef(null)
    const personToken = getMyPersonToken()
    const isAdmin = localStorage.getItem('teaman-admin-token') === sessionToken

    // ── LOAD SESSION ───────────────────────────────────────
    React.useEffect(() => {
      sb.from('sessions').select('*').eq('token', sessionToken).single()
        .then(({ data }) => {
          if (data) {
            setSession(data)
            setDeadlineInput(data.deadline ? data.deadline.slice(0,16) : '')
          }
        })

      sb.from('orders').select('*').eq('session_token', sessionToken).order('created_at')
        .then(({ data }) => { if (data) setOrders(data) })

      const ch = sb.channel('room-' + sessionToken)
        .on('postgres_changes', { event:'*', schema:'public', table:'orders', filter:`session_token=eq.${sessionToken}` },
          () => sb.from('orders').select('*').eq('session_token', sessionToken).order('created_at')
                  .then(({ data }) => { if (data) setOrders(data) })
        )
        .on('postgres_changes', { event:'UPDATE', schema:'public', table:'sessions', filter:`token=eq.${sessionToken}` },
          ({ new: s }) => setSession(s)
        )
        .subscribe()

      return () => sb.removeChannel(ch)
    }, [sessionToken])

    function showToast(msg) {
      setToast(msg)
      clearTimeout(toastRef.current)
      toastRef.current = setTimeout(() => setToast(''), 2500)
    }

    // ── MODAL ──────────────────────────────────────────────
    function openModal(item, existingOrder=null) {
      if (session?.closed) { showToast('❌ 團購已結單，無法點餐'); return }
      if (session?.deadline && new Date() > new Date(session.deadline)) {
        showToast('❌ 已超過截止時間'); return
      }
      if (existingOrder) {
        setEditingOrder(existingOrder)
        setForm({
          size: existingOrder.size,
          ice: existingOrder.ice,
          sugar: existingOrder.sugar,
          addons: existingOrder.addons || [],
          person: existingOrder.person,
        })
        setModal(item)
      } else {
        setEditingOrder(null)
        setForm({
          size: item.fixedSize ? 'M' : (item.price.L ? null : 'M'),
          ice: item.noIce ? '—' : '正常冰',
          sugar: item.fixedSugar ? '固定甜度' : '正常甜',
          addons: [],
          person: localStorage.getItem('teaman-last-name') || '',
        })
        setModal(item)
      }
    }

    function calcPrice() {
      if (!modal) return 0
      const base = modal.price[form.size || 'M'] || modal.price.M
      return base + (form.addons?.length || 0) * 10
    }

    async function submitOrder() {
      if (!form.person?.trim()) { showToast('請輸入姓名！'); return }
      if (!modal.fixedSize && !form.size) { showToast('請選擇杯型！'); return }
      localStorage.setItem('teaman-last-name', form.person.trim())

      const payload = {
        session_token: sessionToken,
        person: form.person.trim(),
        person_token: personToken,
        drink: modal.name,
        size: form.size || 'M',
        ice: form.ice,
        sugar: form.sugar,
        addons: form.addons,
        price: calcPrice(),
      }

      if (editingOrder) {
        const { error } = await sb.from('orders').update(payload).eq('id', editingOrder.id)
        if (error) { showToast('修改失敗'); return }
        showToast(`✅ 已更新 ${payload.person} 的 ${modal.name}`)
      } else {
        const { error } = await sb.from('orders').insert(payload)
        if (error) { showToast('加入失敗'); return }
        showToast(`✅ ${payload.person} 的 ${modal.name} 已加入！`)
      }
      setModal(null)
    }

    async function deleteOrder(id) {
      await sb.from('orders').delete().eq('id', id)
    }

    async function adminDeleteOrder(id) {
      await sb.from('orders').delete().eq('id', id)
      showToast('已刪除')
    }

    async function closeSession() {
      if (!confirm('確定要結單？結單後無法繼續點餐。')) return
      await sb.from('sessions').update({ closed: true }).eq('token', sessionToken)
      showToast('✅ 已結單')
    }

    async function reopenSession() {
      await sb.from('sessions').update({ closed: false }).eq('token', sessionToken)
      showToast('✅ 已重新開放')
    }

    async function saveDeadline() {
      const dl = deadlineInput ? new Date(deadlineInput).toISOString() : null
      await sb.from('sessions').update({ deadline: dl }).eq('token', sessionToken)
      showToast('✅ 截止時間已更新')
    }

    const shareUrl = `${window.location.origin}${window.location.pathname}?t=${sessionToken}`

    function copyShare() {
      navigator.clipboard.writeText(shareUrl)
      setCopied(true)
      setTimeout(() => setCopied(false), 2000)
      showToast('✅ 連結已複製！')
    }

    const myOrders = orders.filter(o => o.person_token === personToken)

    function grouped() {
      return orders.reduce((m,o) => { (m[o.person] = m[o.person]||[]).push(o); return m }, {})
    }

    function exportText() {
      const g = grouped()
      const total = orders.reduce((s,o) => s+o.price, 0)
      let txt = `【TEAMAN 松山門市 訂單】\n${session?.name||''}\n${'─'.repeat(28)}\n`
      Object.entries(g).forEach(([person, items]) => {
        txt += `\n👤 ${person}\n`
        items.forEach(o => {
          const opts = [o.size+'杯', o.ice, o.sugar, ...(o.addons||[]).map(a=>'加'+a)].filter(x=>x&&x!=='—').join(' / ')
          txt += `  ・${o.drink}（${opts}）  NT${o.price}\n`
        })
        txt += `  小計：NT${items.reduce((s,o)=>s+o.price,0)}\n`
      })
      txt += `\n${'─'.repeat(28)}\n💰 總計：NT$ ${total}\n`
      return txt
    }

    const g = grouped()
    const grandTotal = orders.reduce((s,o) => s+o.price, 0)
    const isClosed = session?.closed
    const isPastDeadline = session?.deadline && new Date() > new Date(session.deadline)
    const canOrder = !isClosed && !isPastDeadline

    if (!session) return (
      <div style={{minHeight:'100vh',background:c.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div style={{textAlign:'center',color:c.muted}}>
          <div style={{fontSize:'2.5rem'}}>🧋</div>
          <div style={{marginTop:12}}>載入中...</div>
        </div>
      </div>
    )

    return (
      <div style={{fontFamily:"'Noto Serif TC',serif",background:c.bg,minHeight:'100vh',color:c.text,display:'flex',flexDirection:'column'}}>

        {/* HEADER */}
        <div style={{background:c.text,color:'#fff',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,gap:8,flexShrink:0}}>
          <div style={{minWidth:0}}>
            <div style={{fontSize:'1.1rem',fontWeight:900,color:c.accent2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
              🧋 {session.name}
            </div>
            <div style={{fontSize:'0.65rem',color:'#b0967a',marginTop:2,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
              {isClosed && <span style={{background:'#c0392b',color:'#fff',borderRadius:4,padding:'1px 6px',fontSize:'0.6rem'}}>已結單</span>}
              {!isClosed && isPastDeadline && <span style={{background:'#c0392b',color:'#fff',borderRadius:4,padding:'1px 6px',fontSize:'0.6rem'}}>已截止</span>}
              {!isClosed && !isPastDeadline && <span style={{background:'#2ecc71',color:'#fff',borderRadius:4,padding:'1px 6px',fontSize:'0.6rem'}}>開放中</span>}
              {session.deadline && <span>{new Date(session.deadline).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})} 截止</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            {isAdmin && (
              <button onClick={()=>setShowAdmin(true)}
                style={{background:'#fff2',color:'#fff',border:'1px solid #fff4',borderRadius:50,padding:'7px 12px',fontSize:'0.78rem',cursor:'pointer',fontFamily:'inherit'}}>
                ⚙️ 管理
              </button>
            )}
            <button onClick={()=>setShowSummary(true)}
              style={{background:c.accent,color:'#fff',border:'none',borderRadius:50,padding:'7px 14px',fontSize:'0.8rem',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'}}>
              📋 {orders.length}筆
            </button>
          </div>
        </div>

        {/* SHARE BAR */}
        <div style={{background:'#fffbf4',borderBottom:`1.5px solid ${c.border}`,padding:'8px 16px',display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1,fontSize:'0.7rem',color:c.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'monospace'}}>
            {shareUrl}
          </div>
          <button onClick={copyShare}
            style={{flexShrink:0,background:copied?'#2ecc71':c.accent2,color:c.text,border:'none',borderRadius:6,padding:'6px 14px',fontSize:'0.78rem',fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'background 0.2s'}}>
            {copied ? '✓ 已複製' : '📋 複製連結'}
          </button>
        </div>

        {/* BODY */}
        <div style={{display:'flex',flex:1,overflow:'hidden',height:'calc(100vh - 98px)'}}>
          {/* SIDEBAR */}
          <div style={{width:130,background:c.surface,borderRight:`1.5px solid ${c.border}`,overflowY:'auto',flexShrink:0}}>
            {menu.map((cat,ci) => (
              <button key={ci}
                style={{display:'block',width:'100%',textAlign:'left',padding:'9px 12px',background:activeCat===ci?'#fff0e6':'none',border:'none',borderLeft:`3px solid ${activeCat===ci?c.accent:'transparent'}`,color:activeCat===ci?c.accent:c.muted,fontFamily:'inherit',fontSize:'0.8rem',fontWeight:activeCat===ci?700:400,cursor:'pointer',lineHeight:1.35}}
                onClick={()=>{setActiveCat(ci);document.getElementById('sec-'+ci)?.scrollIntoView({behavior:'smooth',block:'start'})}}>
                {cat.cat}
              </button>
            ))}
          </div>

          {/* CONTENT */}
          <div style={{flex:1,overflowY:'auto',padding:'16px 12px 80px'}}>
            {!canOrder && (
              <div style={{background:'#fff3f3',border:'1.5px solid #f5c6c6',borderRadius:10,padding:'12px 16px',marginBottom:16,fontSize:'0.85rem',color:'#8b2020',textAlign:'center'}}>
                {isClosed ? '此團購已結單，無法點餐' : '點餐截止時間已過'}
              </div>
            )}

            {myOrders.length > 0 && (
              <div style={{background:'#fff8ef',border:`1.5px solid ${c.accent2}`,borderRadius:10,padding:'10px 14px',marginBottom:16}}>
                <div style={{fontSize:'0.75rem',fontWeight:700,color:c.accent,marginBottom:8}}>我的訂單</div>
                {myOrders.map(o => {
                  const srcItem = menu.flatMap(c=>c.items).find(i=>i.name===o.drink)
                  return (
                    <div key={o.id} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                      <div style={{flex:1,fontSize:'0.82rem'}}>
                        <span style={{fontWeight:700}}>{o.drink}</span>
                        <span style={{fontSize:'0.68rem',color:c.muted,marginLeft:6,fontFamily:'monospace'}}>{o.size} {o.ice} {o.sugar}</span>
                      </div>
                      <span style={{fontSize:'0.82rem',color:c.accent,fontFamily:'monospace',fontWeight:700}}>NT${o.price}</span>
                      {canOrder && srcItem && (
                        <button onClick={()=>openModal(srcItem,o)}
                          style={{background:c.tagBg,border:`1px solid ${c.border}`,borderRadius:5,padding:'3px 8px',fontSize:'0.7rem',cursor:'pointer',fontFamily:'inherit',color:c.muted}}>
                          修改
                        </button>
                      )}
                      {canOrder && (
                        <button onClick={()=>deleteOrder(o.id)}
                          style={{background:'none',border:'none',color:'#c0a090',cursor:'pointer',fontSize:'0.8rem'}}>✕</button>
                      )}
                    </div>
                  )
                })}
              </div>
            )}

            {menu.map((cat,ci) => (
              <div key={ci} id={'sec-'+ci} style={{marginBottom:24}}>
                <div style={{fontSize:'1.05rem',fontWeight:900,borderBottom:`2.5px solid ${c.accent2}`,paddingBottom:5,marginBottom:10,display:'flex',alignItems:'baseline',gap:8}}>

                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8}}>

                    return (
                      <div key={ii}
                        style={{background:c.card,border:`1.5px solid ${c.border}`,borderRadius:10,padding:'10px 11px',cursor:canOrder?'pointer':'default',transition:'all 0.15s',opacity:canOrder?1:0.6}}

                        onMouseLeave={e=>{e.currentTarget.style.borderColor=c.border;e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=''}}
                        onClick={()=>canOrder&&openModal(item)}>
                        <div style={{fontSize:'0.86rem',fontWeight:700,lineHeight:1.3}}>{item.name}</div>
                        <div style={{fontSize:'0.62rem',color:c.muted,fontFamily:'monospace',marginTop:2}}>{item.en}</div>

                        <div style={{fontSize:'0.82rem',color:c.accent,fontWeight:700,marginTop:6,fontFamily:'monospace'}}>NT$ {priceStr}</div>
                      </div>
                    )
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* ORDER MODAL */}
        {modal && (
          <div style={{position:'fixed',inset:0,background:'rgba(20,10,5,0.55)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
            onClick={e=>e.target===e.currentTarget&&setModal(null)}>
            <div style={{background:c.card,borderRadius:16,padding:20,width:'100%',maxWidth:400,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 40px rgba(0,0,0,0.28)'}}>
              <div style={{fontSize:'1rem',fontWeight:900}}>{modal.name} {editingOrder && <span style={{fontSize:'0.72rem',color:c.accent,fontWeight:400}}>（修改中）</span>}</div>
              <div style={{fontSize:'0.65rem',color:c.muted,fontFamily:'monospace',marginBottom:2}}>{modal.en}</div>

              {!modal.fixedSize && (
                <>
                  <label style={{fontSize:'0.75rem',fontWeight:700,color:c.muted,display:'block',marginBottom:5,marginTop:12}}>杯型</label>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {['M','L'].filter(s=>modal.price[s]).map(s=>(
                      <button key={s} onClick={()=>setForm(f=>({...f,size:s}))}

                      </button>

                  </div>
                </>

              {!modal.noIce && (
                <>
                  <label style={{fontSize:'0.75rem',fontWeight:700,color:c.muted,display:'block',marginBottom:5,marginTop:12}}>冰量</label>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {ICE_OPTS.map(opt=>(
                      <button key={opt} onClick={()=>setForm(f=>({...f,ice:opt}))}
                        style={{padding:'7px 13px',border:`1.5px solid ${form.ice===opt?c.accent:c.border}`,borderRadius:6,background:form.ice===opt?c.accent:'none',color:form.ice===opt?'#fff':c.text,fontFamily:'inherit',fontSize:'0.8rem',cursor:'pointer',fontWeight:form.ice===opt?700:400}}>
                        {opt}
                      </button>
                    ))}
                  </div>
                </>
              )}

              {!modal.fixedSugar && (
                <>
                  <label style={{fontSize:'0.75rem',fontWeight:700,color:c.muted,display:'block',marginBottom:5,marginTop:12}}>甜度</label>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {SUGAR_OPTS.map(opt=>(
                      <button key={opt} onClick={()=>setForm(f=>({...f,sugar:opt}))}
                        style={{padding:'7px 13px',border:`1.5px solid ${form.sugar===opt?c.accent:c.border}`,borderRadius:6,background:form.sugar===opt?c.accent:'none',color:form.sugar===opt?'#fff':c.text,fontFamily:'inherit',fontSize:'0.8rem',cursor:'pointer',fontWeight:form.sugar===opt?700:400}}>
                        {opt}
                      </button>
                    ))}
                  </div>
                </>
              )}

              <label style={{fontSize:'0.75rem',fontWeight:700,color:c.muted,display:'block',marginBottom:5,marginTop:12}}>加料 +10元 / 項</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {ADDON_OPTS.map(opt=>{
                  const active = form.addons?.includes(opt)
                  return (
                    <button key={opt} onClick={()=>setForm(f=>{
                      const a=f.addons||[]; return {...f,addons:active?a.filter(x=>x!==opt):[...a,opt]}
                    })}
                      style={{padding:'7px 13px',border:`1.5px solid ${active?c.accent:c.border}`,borderRadius:6,background:active?c.accent:'none',color:active?'#fff':c.text,fontFamily:'inherit',fontSize:'0.8rem',cursor:'pointer',fontWeight:active?700:400}}>
                      {opt}
                    </button>
                  )
                })}
              </div>

              <label style={{fontSize:'0.75rem',fontWeight:700,color:c.muted,display:'block',marginBottom:5,marginTop:12}}>點餐人姓名</label>
              <input
                style={{width:'100%',padding:'10px 14px',border:`1.5px solid ${c.border}`,borderRadius:8,fontFamily:'inherit',fontSize:'0.95rem',background:c.surface,color:c.text,outline:'none'}}
                placeholder="輸入你的名字"
                value={form.person||''}
                onChange={e=>setForm(f=>({...f,person:e.target.value}))}
                onKeyDown={e=>e.key==='Enter'&&submitOrder()}
                autoFocus
              />

              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16,paddingTop:14,borderTop:`1px solid ${c.border}`}}>
                <div style={{fontSize:'1.3rem',color:c.accent,fontWeight:700,fontFamily:'monospace'}}>NT$ {calcPrice()}</div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>setModal(null)}
                    style={{padding:'10px 16px',border:`1.5px solid ${c.border}`,borderRadius:8,background:'none',fontFamily:'inherit',fontSize:'0.85rem',cursor:'pointer',color:c.muted}}>取消</button>
                  <button onClick={submitOrder}
                    style={{padding:'10px 20px',border:'none',borderRadius:8,background:c.accent,color:'#fff',fontFamily:'inherit',fontSize:'0.88rem',fontWeight:700,cursor:'pointer'}}>
                    {editingOrder ? '儲存修改' : '加入訂單'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* SUMMARY PANEL */}
        {showSummary && (
          <div style={{position:'fixed',inset:0,background:'rgba(20,10,5,0.55)',zIndex:300,display:'flex',justifyContent:'flex-end'}}
            onClick={e=>e.target===e.currentTarget&&setShowSummary(false)}>
            <div style={{background:c.card,width:'100%',maxWidth:440,height:'100vh',overflowY:'auto',padding:20,boxShadow:'-8px 0 40px rgba(0,0,0,0.18)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <div style={{fontSize:'1.1rem',fontWeight:900}}>📋 訂單總覽</div>
                <button onClick={()=>setShowSummary(false)}
                  style={{background:c.tagBg,border:'none',borderRadius:'50%',width:32,height:32,fontSize:'1rem',cursor:'pointer',color:c.muted}}>✕</button>
              </div>

              {orders.length===0 ? (
                <div style={{textAlign:'center',padding:'40px 0',color:c.muted}}>
                  <div style={{fontSize:'2rem'}}>🧋</div>
                  <div style={{marginTop:8}}>還沒有人點餐</div>
                </div>
              ) : (
                <>
                  {Object.entries(g).map(([person,items])=>(
                    <div key={person} style={{marginBottom:16}}>
                      <div style={{fontWeight:700,color:c.accent,borderBottom:`1px dashed ${c.accent2}`,paddingBottom:4,marginBottom:7,display:'flex',justifyContent:'space-between',fontSize:'0.9rem'}}>
                        <span>{person}</span>
                        <span style={{fontSize:'0.72rem',color:c.muted,fontFamily:'monospace'}}>NT${items.reduce((s,o)=>s+o.price,0)}</span>
                      </div>
                      {items.map(o=>{
                        const opts=[o.size+'杯',o.ice,o.sugar,...(o.addons||[]).map(a=>'加'+a)].filter(x=>x&&x!=='—').join(' · ')
                        return (
                          <div key={o.id} style={{display:'flex',alignItems:'flex-start',padding:'7px 10px',background:c.surface,borderRadius:7,marginBottom:4,gap:8}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:'0.85rem',fontWeight:700}}>{o.drink}</div>
                              <div style={{fontSize:'0.65rem',color:c.muted,fontFamily:'monospace',marginTop:2,lineHeight:1.6}}>{opts}</div>
                            </div>
                            <div style={{fontFamily:'monospace',fontSize:'0.85rem',color:c.accent,whiteSpace:'nowrap'}}>NT${o.price}</div>
                          </div>
                        )
                      })}
                    </div>
                  ))}
                  <div style={{background:c.text,color:'#fff',borderRadius:10,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                    <div style={{opacity:0.7,fontSize:'0.9rem'}}>合計金額</div>
                    <div style={{fontFamily:'monospace',fontSize:'1.4rem',fontWeight:700,color:c.accent2}}>NT$ {grandTotal}</div>
                  </div>

                  <div style={{marginTop:16}}>
                    <div style={{fontSize:'0.68rem',fontFamily:'monospace',color:c.muted,letterSpacing:'0.1em',textTransform:'uppercase'}}>結單文字</div>
                    <div style={{background:'#1a1208',color:'#e8d0a8',fontFamily:'monospace',fontSize:'0.72rem',lineHeight:1.8,padding:12,borderRadius:8,whiteSpace:'pre-wrap',wordBreak:'break-all',marginTop:6}}>{exportText()}</div>
                    <button onClick={()=>{navigator.clipboard.writeText(exportText());showToast('✅ 已複製！')}}
                      style={{width:'100%',padding:11,background:c.accent2,border:'none',borderRadius:8,fontFamily:'inherit',fontSize:'0.88rem',fontWeight:700,cursor:'pointer',color:c.text,marginTop:8}}>
                      📋 複製結單文字
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {/* ADMIN PANEL */}
        {showAdmin && isAdmin && (
          <div style={{position:'fixed',inset:0,background:'rgba(20,10,5,0.55)',zIndex:400,display:'flex',justifyContent:'flex-end'}}
            onClick={e=>e.target===e.currentTarget&&setShowAdmin(false)}>
            <div style={{background:c.card,width:'100%',maxWidth:480,height:'100vh',overflowY:'auto',padding:20,boxShadow:'-8px 0 40px rgba(0,0,0,0.18)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <div style={{fontSize:'1.1rem',fontWeight:900}}>⚙️ 發起人管理</div>
                <button onClick={()=>setShowAdmin(false)}
                  style={{background:c.tagBg,border:'none',borderRadius:'50%',width:32,height:32,fontSize:'1rem',cursor:'pointer',color:c.muted}}>✕</button>
              </div>

              <div style={{background:isClosed?'#fff0f0':'#f0fff4',border:`1.5px solid ${isClosed?'#f5c6c6':'#c6e8d0'}`,borderRadius:10,padding:'12px 16px',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:700,color:isClosed?'#c0392b':'#27ae60',fontSize:'0.9rem'}}>{isClosed?'❌ 已結單':'✅ 開放中'}</div>
                  <div style={{fontSize:'0.72rem',color:c.muted,marginTop:3}}>共 {orders.length} 筆訂單・NT$ {grandTotal}</div>
                </div>
                {isClosed
                  ? <button onClick={reopenSession}
                      style={{background:'#27ae60',color:'#fff',border:'none',borderRadius:8,padding:'8px 14px',fontSize:'0.82rem',fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>重新開放</button>
                  : <button onClick={closeSession}
                      style={{background:'#c0392b',color:'#fff',border:'none',borderRadius:8,padding:'8px 14px',fontSize:'0.82rem',fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>結單</button>
                }
              </div>

              <div style={{background:c.surface,border:`1.5px solid ${c.border}`,borderRadius:10,padding:'14px 16px',marginBottom:16}}>
                <div style={{fontWeight:700,fontSize:'0.85rem',marginBottom:8}}>⏰ 截止時間</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input type="datetime-local"
                    value={deadlineInput}
                    onChange={e=>setDeadlineInput(e.target.value)}
                    style={{flex:1,padding:'8px 10px',border:`1.5px solid ${c.border}`,borderRadius:8,fontFamily:'inherit',fontSize:'0.82rem',background:'#fff',color:c.text,outline:'none'}}
                  />
                  <button onClick={saveDeadline}
                    style={{background:c.accent2,border:'none',borderRadius:8,padding:'8px 14px',fontSize:'0.82rem',fontWeight:700,cursor:'pointer',fontFamily:'inherit',color:c.text,whiteSpace:'nowrap'}}>儲存</button>
                </div>
                {deadlineInput && <div style={{fontSize:'0.7rem',color:c.muted,marginTop:6}}>截止於 {new Date(deadlineInput).toLocaleString('zh-TW')}</div>}
              </div>

              <div style={{fontWeight:700,fontSize:'0.85rem',marginBottom:10}}>📝 所有訂單</div>
              {orders.length===0 ? (
                <div style={{textAlign:'center',padding:'24px',color:c.muted,fontSize:'0.85rem'}}>還沒有訂單</div>
              ) : (
                Object.entries(g).map(([person,items])=>(
                  <div key={person} style={{marginBottom:14}}>
                    <div style={{fontWeight:700,color:c.accent,borderBottom:`1px dashed ${c.accent2}`,paddingBottom:4,marginBottom:6,display:'flex',justifyContent:'space-between',fontSize:'0.88rem'}}>
                      <span>{person}</span>
                      <span style={{fontSize:'0.72rem',color:c.muted,fontFamily:'monospace'}}>NT${items.reduce((s,o)=>s+o.price,0)}</span>
                    </div>
                    {items.map(o=>{
                      const opts=[o.size+'杯',o.ice,o.sugar,...(o.addons||[]).map(a=>'加'+a)].filter(x=>x&&x!=='—').join(' · ')
                      return (
                        <div key={o.id} style={{display:'flex',alignItems:'flex-start',padding:'7px 10px',background:c.surface,borderRadius:7,marginBottom:4,gap:8}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:'0.83rem',fontWeight:700}}>{o.drink}</div>
                            <div style={{fontSize:'0.64rem',color:c.muted,fontFamily:'monospace',marginTop:2,lineHeight:1.6}}>{opts}</div>
                          </div>
                          <div style={{fontFamily:'monospace',fontSize:'0.83rem',color:c.accent,whiteSpace:'nowrap'}}>NT${o.price}</div>
                          <button onClick={()=>adminDeleteOrder(o.id)}
                            style={{background:'none',border:'none',color:'#c0a090',cursor:'pointer',fontSize:'0.8rem',padding:'0 2px'}}>✕</button>
                        </div>
                      )
                    })}
                  </div>
                ))
              )}

              <div style={{marginTop:16,paddingTop:16,borderTop:`1px solid ${c.border}`}}>
                <button onClick={()=>{navigator.clipboard.writeText(exportText());showToast('✅ 已複製！')}}
                  style={{width:'100%',padding:11,background:c.accent2,border:'none',borderRadius:8,fontFamily:'inherit',fontSize:'0.88rem',fontWeight:700,cursor:'pointer',color:c.text}}>
                  📋 複製結單文字
                </button>
              </div>
            </div>
          </div>
        )}

        {toast && (
          <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:'#3a7d44',color:'#fff',padding:'10px 24px',borderRadius:50,fontSize:'0.88rem',fontWeight:700,zIndex:9999,whiteSpace:'nowrap'}}>
            {toast}
          </div>
        )}
      </div>
    )
  }

  // ── ROOT ─────────────────────────────────────────────────
  function Root() {
    const token = getUrlToken()
    if (!token) return <HomeScreen />
    return <OrderApp sessionToken={token} />
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />)
  </script>
</body>
</html>
